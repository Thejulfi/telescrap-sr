<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Scanner de billets</title>
    <style>
        body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
        h1 { font-size: 1.4rem; }
        h2 { font-size: 1.1rem; margin-top: 24px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type=number], input[type=text], select {
            width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 14px;
        }
        .row { display: flex; gap: 16px; }
        .row > div { flex: 1; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .checkbox-row label { margin: 0; font-weight: normal; }
        button { padding: 10px 20px; background: #0078d4; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #005fa3; }
    </style>
</head>
<body>
    <h1>Admin Panel — Scanner de billets</h1>
    <form method="POST" action="/config">

        <h2>Général</h2>
        <div class="row">
            <div>
                <label for="interval">Intervalle (secondes)</label>
                <input type="number" id="interval" name="interval" value="{interval}" min="10" step="10" required>
            </div>
            <div>
                <label for="mode">Mode de scan</label>
                <select id="mode" name="mode">
                    <option value="passive" {sel_passive}>Passif</option>
                    <option value="aggressive" {sel_aggressive}>Agressif</option>
                </select>
            </div>
        </div>

        <label for="nature">Nature du match</label>
        <select id="nature" name="nature">
            <option value="rugby" {sel_rugby}>Rugby</option>
            <option value="basketball" {sel_basketball}>Basketball</option>
            <option value="other" {sel_other}>Autre</option>
        </select>

        <h2>Filtres</h2>
        <div class="row">
            <div>
                <label for="price_threshold">Prix max (€, vide = sans limite)</label>
                <input type="number" id="price_threshold" name="price_threshold"
                       value="{price_threshold}" min="0" step="0.5">
            </div>
            <div>
                <label for="side_by_side">Places côte à côte (vide = sans filtre)</label>
                <input type="number" id="side_by_side" name="side_by_side"
                       value="{side_by_side}" min="1" step="1">
            </div>
        </div>

        <label for="match_title">Filtre par titre du match (vide = tous) (vous devez rentrer le titre exact)</label>
        <input type="text" id="match_title" name="match_title" value="{match_title}"
               placeholder="ex: STADE ROCHELAIS / UNION BORDEAUX BÈGLES">

        <div class="checkbox-row">
            <input type="checkbox" id="is_preview" name="is_preview" {chk_preview}>
            <label for="is_preview">Afficher la prévisualisation de la place</label>
        </div>

        <button type="submit">Appliquer</button>
    </form>
</body>
</html>
