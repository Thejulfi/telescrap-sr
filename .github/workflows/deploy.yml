name: Cross-Compile and Deploy
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build release for Raspberry Pi 3/4 (64-bit)
        run: cargo zigbuild --release --target aarch64-unknown-linux-gnu

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-binary
          path: target/aarch64-unknown-linux-gnu/release/telescrap-sr

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-unknown-linux-gnu/release/telescrap-sr

      - name: Tailscale
        if: github.ref == 'refs/heads/main'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-sr-rugby-scrapper

      - name: Prepare deployment directory
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: jfi
          key: ${{ secrets.RPI_SSH_KEY }}
          script: |
            mkdir -p ~/rust-project
            chmod 755 ~/rust-project
            rm -f ~/rust-project/telescrap-sr

      - name: Copy file via SCP
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PI_HOST }}
          username: jfi
          key: ${{ secrets.RPI_SSH_KEY }}
          source: "target/aarch64-unknown-linux-gnu/release/telescrap-sr"
          target: "~/rust-project/"
          strip_components: 3
          overwrite: true